name: Deploy client to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static artifact
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID || secrets.TWITCH_ID_CLIENT || vars.TWITCH_CLIENT_ID || vars.TWITCH_ID_CLIENT }}
          BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          test -n "$TWITCH_CLIENT_ID" || (echo "Missing TWITCH_CLIENT_ID / TWITCH_ID_CLIENT (set GitHub environment secret or variable)" && exit 1)
          rm -rf dist
          mkdir -p dist
          cp -R client/. dist/
          sed -i "s|__TWITCH_CLIENT_ID__|${TWITCH_CLIENT_ID}|g" dist/runtime-config.js
          sed -i "s|__TWITCH_ID_CLIENT__|${TWITCH_CLIENT_ID}|g" dist/runtime-config.js
          sed -i "s|__BUILD_ID__|${BUILD_ID}|g" dist/index.html
          if rg -q "__TWITCH_(CLIENT_ID|ID_CLIENT)__" dist/runtime-config.js; then
            echo "Runtime config still contains Twitch placeholders after build"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
